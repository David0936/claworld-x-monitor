{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="card shadow-sm mt-5">
      <div class="card-body text-center">
        <img src="{{ url_for('static', filename='claworld-dark.png') }}" alt="CLAWORLD" class="img-fluid mb-2" style="max-height:46px">
        <div class="muted mb-3">财经推文监控 + 股票秒筛</div>
        <form method="post">
          <input type="password" name="password" class="form-control mb-3" placeholder="密码" autofocus>
          <button class="btn btn-primary w-100">登录</button>
        </form>
        <p class="muted mt-3 mb-0">密码在「设置 → 登录保护」里自行设置；可随时关闭登录保护。</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
